<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Перенаправление...</title>
  <script>
    (function() {
      // Полный путь без домена и без /snipr
      var fullPath = window.location.pathname;
      // Убираем префикс /snipr, если есть
      var base = '/snipr';
      var relativePath = fullPath.startsWith(base) ? fullPath.slice(base.length) : fullPath;
      // Если это корень или пусто — идём на главную
      if (!relativePath || relativePath === '/') {
        window.location.replace(base + '/');
        return;
      }
      // Иначе перенаправляем на hash-версию пути
      window.location.replace(base + '/#' + relativePath);
    })();
  </script>
</head>
<body>Загрузка...</body>
</html>
